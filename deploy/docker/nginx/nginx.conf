server {
    listen 80;
    server_name _;

    # v1 uploads are non-resumable full-file PUTs; keep a large explicit cap.
    client_max_body_size 1024m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /healthz {
        proxy_pass http://photovault-api:9301/healthz;
    }

    # Client daemon traffic is authenticated by photovault-api client tokens.
    location /v1/client/ {
        proxy_pass http://photovault-api:9301;
    }

    location /v1/upload/ {
        proxy_pass http://photovault-api:9301;
    }

    # Operator/admin API surface is protected by HTTP basic auth.
    location /v1/admin/ {
        auth_basic "photovault-admin";
        auth_basic_user_file /etc/nginx/conf.d/server-ui.htpasswd;
        proxy_pass http://photovault-api:9301;
    }

    location = /v1/storage/index {
        auth_basic "photovault-admin";
        auth_basic_user_file /etc/nginx/conf.d/server-ui.htpasswd;
        proxy_pass http://photovault-api:9301;
    }

    location / {
        auth_basic "photovault-server-ui";
        auth_basic_user_file /etc/nginx/conf.d/server-ui.htpasswd;
        proxy_pass http://photovault-server-ui:9401;
    }
}
