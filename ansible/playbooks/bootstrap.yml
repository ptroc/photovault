---
- name: Bootstrap photovault host
  hosts: all
  become: true
  vars:
    photovault_user: photovault
    photovault_group: photovault
    photovault_root: /opt/photovault
    photovault_env_dir: /etc/photovault
    photovault_log_dir: /var/log/photovault
    clientd_state_dir: /var/lib/photovault-clientd
    systemd_unit_dir: /etc/systemd/system
  tasks:
    - name: Ensure baseline packages are present
      ansible.builtin.package:
        name:
          - python3
          - python3-venv
          - python3-pip
          - sqlite3
        state: present

    - name: Ensure photovault group exists
      ansible.builtin.group:
        name: "{{ photovault_group }}"
        system: true

    - name: Ensure photovault user exists
      ansible.builtin.user:
        name: "{{ photovault_user }}"
        group: "{{ photovault_group }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Ensure photovault base directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ photovault_root }}", owner: "root", group: "root", mode: "0755" }
        - { path: "{{ photovault_env_dir }}", owner: "root", group: "{{ photovault_group }}", mode: "0750" }
        - { path: "{{ photovault_log_dir }}", owner: "{{ photovault_user }}", group: "{{ photovault_group }}", mode: "0750" }
        - { path: "{{ clientd_state_dir }}", owner: "{{ photovault_user }}", group: "{{ photovault_group }}", mode: "0750" }

    - name: Ensure service environment files exist
      ansible.builtin.copy:
        dest: "{{ photovault_env_dir }}/{{ item }}.env"
        content: |
          # Managed by Ansible (bootstrap playbook)
        owner: root
        group: "{{ photovault_group }}"
        mode: "0640"
        force: false
      loop:
        - photovault-clientd
        - photovault-client-ui
        - photovault-api
        - photovault-server-ui

    - name: Ensure photovault-api DB URL variable exists in env file
      ansible.builtin.lineinfile:
        path: "{{ photovault_env_dir }}/photovault-api.env"
        regexp: "^PHOTOVAULT_API_DATABASE_URL="
        line: "PHOTOVAULT_API_DATABASE_URL="
        insertafter: EOF

    - name: Ensure photovault-api storage root variable exists in env file
      ansible.builtin.lineinfile:
        path: "{{ photovault_env_dir }}/photovault-api.env"
        regexp: "^PHOTOVAULT_API_STORAGE_ROOT="
        line: "PHOTOVAULT_API_STORAGE_ROOT="
        insertafter: EOF

    - name: Install systemd unit files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../deploy/systemd/{{ item }}"
        dest: "{{ systemd_unit_dir }}/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - photovault-clientd.service
        - photovault-client-ui.service
        - photovault-api.service
        - photovault-server-ui.service
      notify: Reload systemd

    - name: Enable photovault services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
      loop:
        - photovault-clientd.service
        - photovault-client-ui.service
        - photovault-api.service
        - photovault-server-ui.service

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
